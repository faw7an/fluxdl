name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Packaging Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libarchive-tools curl libfuse2
          gem install fpm
          curl -fL -o appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

      - name: Install Dependencies
        run: bun install

      - name: Build Application (Linux)
        run: bun run build:canary
        
      - name: Package Linux Formats
        run: |
          chmod +x scripts/package-linux.sh
          ./scripts/package-linux.sh
        env:
          APPIMAGE_TOOL: ./appimagetool

      - name: Archive Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fluxdl-linux-packages
          path: artifacts/

      - name: Publish to Github Releases
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
